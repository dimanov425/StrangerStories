name: StrangerStories
options:
  bundleIdPrefix: com.strangerstories
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    GENERATE_INFOPLIST_FILE: true

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"
  Kingfisher:
    url: https://github.com/onevcat/Kingfisher
    from: "8.0.0"

targets:
  StrangerStories:
    type: application
    platform: iOS
    sources:
      - StrangerStories
      - Shared
    resources:
      - StrangerStories/Resources
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_CFBundleDisplayName: "Stranger Stories"
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Kingfisher
      - target: StrangerStoriesWidgets
      - target: StrangerStoriesLiveActivity
    entitlements:
      path: StrangerStories/StrangerStories.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.security.application-groups:
          - group.com.strangerstories.shared
        aps-environment: development

  StrangerStoriesWidgets:
    type: app-extension
    platform: iOS
    sources:
      - StrangerStoriesWidgets
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.strangerstories.StrangerStories.Widgets
    info:
      path: StrangerStoriesWidgets/Info.plist
      properties:
        CFBundleDisplayName: "Stranger Stories Widgets"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Kingfisher

  StrangerStoriesLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - StrangerStoriesLiveActivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.strangerstories.StrangerStories.LiveActivity
    info:
      path: StrangerStoriesLiveActivity/Info.plist
      properties:
        CFBundleDisplayName: "Writing Timer"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        NSSupportsLiveActivities: true

  StrangerStoriesTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - StrangerStoriesTests
    dependencies:
      - target: StrangerStories

  StrangerStoriesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - StrangerStoriesUITests
    dependencies:
      - target: StrangerStories
